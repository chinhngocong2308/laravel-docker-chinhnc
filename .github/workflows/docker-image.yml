name: Setup and Run Docker Project

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Set up Docker
      uses: docker/setup-qemu-action@v2

    - name: Retry Docker image pull
      run: |
        until docker pull nginx; do echo "Retrying..."; sleep 10; done

    - name: Run make install
      run: |
        export DOCKER_CLIENT_TIMEOUT=300
        export COMPOSE_HTTP_TIMEOUT=300
        make install

    - name: Run make seed
      run: |
        make seed

    - name: Run make seed-logo-image
      run: |
        make seed-logo-image

    - name: List Docker containers
      run: |
        docker ps

    - name: Show logs for db container if it fails
      if: failure()
      run: docker logs db

    - name: Install ngrok
      run: |
        curl -s https://ngrok.com/download | tar xz -C /usr/local/bin

    - name: Expose the app using ngrok
      run: |
        nohup ngrok http 80 &

    - name: Get the ngrok URL
      run: |
        sleep 10
        curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url'